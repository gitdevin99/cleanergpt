name: CleanupClone
options:
  bundleIdPrefix: com.sanjana
  deploymentTarget:
    iOS: "18.0"
settings:
  base:
    SWIFT_VERSION: 6.0
    DEVELOPMENT_TEAM: P9J5D8KGS2
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "3"
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
    INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
    INFOPLIST_KEY_UILaunchScreen_Generation: true
    INFOPLIST_KEY_CFBundleDisplayName: Cleaner GPT
    INFOPLIST_KEY_NSPhotoLibraryUsageDescription: Cleanup needs access to your photos to detect duplicates, screenshots, and large media.
    INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: Cleanup needs permission to save compressed exports and private vault media.
    INFOPLIST_KEY_NSContactsUsageDescription: Cleanup needs access to your contacts to find and merge duplicates.
    INFOPLIST_KEY_NSFaceIDUsageDescription: Use Face ID to unlock your Secret Space faster.
packages:
  PostHog:
    url: https://github.com/PostHog/posthog-ios
    from: 3.0.0
  Adapty:
    url: https://github.com/adaptyteam/AdaptySDK-iOS
    from: 3.0.0
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: 7.0.0
targets:
  CleanupClone:
    type: application
    platform: iOS
    sources:
      - path: CleanupClone
    resources:
      - path: CleanupClone/Assets.xcassets
    dependencies:
      - target: CleanerWidgets
      - package: PostHog
        product: PostHog
      - package: Adapty
        product: Adapty
      - package: Adapty
        product: AdaptyUI
      - package: GoogleSignIn
        product: GoogleSignIn
    settings:
      base:
        PRODUCT_NAME: CleanupClone
        PRODUCT_MODULE_NAME: CleanupClone
        PRODUCT_BUNDLE_IDENTIFIER: com.sanjana.cleanupclone
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_ASSET_PATHS: "\"CleanupClone/Assets.xcassets\""
        ENABLE_PREVIEWS: YES
        CODE_SIGN_ENTITLEMENTS: CleanupClone/CleanupCloneDebug.entitlements
        INFOPLIST_KEY_UIBackgroundModes: audio
  CleanerWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: CleanerWidgets
        excludes:
          - "Info.plist"
          - "CleanerWidgets.entitlements"
    settings:
      base:
        PRODUCT_NAME: CleanerWidgets
        PRODUCT_MODULE_NAME: CleanerWidgets
        PRODUCT_BUNDLE_IDENTIFIER: com.sanjana.cleanupclone.widgets
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: CleanerWidgets/Info.plist
        CODE_SIGN_ENTITLEMENTS: CleanerWidgets/CleanerWidgets.entitlements
        SKIP_INSTALL: YES
schemes:
  CleanupClone:
    build:
      targets:
        CleanupClone: all
        CleanerWidgets: all
    run:
      config: Debug
      executable: CleanupClone
    test:
      config: Debug
    profile:
      config: Release
      executable: CleanupClone
    analyze:
      config: Debug
    archive:
      config: Release
